services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: ./app
    command: ["sh", "-c", "alembic -c alembic.ini upgrade head"]
    volumes:
      - ./app:/app
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/app
    env_file: .env
    environment:
      APP_COMMIT: ${APP_COMMIT:-}
      APP_BUILT_AT: ${APP_BUILT_AT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=5); sys.exit(0)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "8000:8000"

  frontend:
    image: node:22-alpine
    profiles: ["frontend"]
    working_dir: /frontend
    command: ["sh", "-c", "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"]
    environment:
      OPSWATCH_API_ORIGIN: http://api:8000
      NEXT_TELEMETRY_DISABLED: "1"
      CHOKIDAR_USEPOLLING: "1"
    volumes:
      - ./frontend:/frontend
      - frontend_node_modules:/frontend/node_modules
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3001:3000"

  worker:
    build:
      context: ./worker
    volumes:
      - ./worker:/worker
    env_file: .env
    environment:
      PYTHONPATH: /worker
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  scheduler:
    build:
      context: ./worker
    volumes:
      - ./worker:/worker
    env_file: .env
    environment:
      PYTHONPATH: /worker
      RQ_QUEUE: checks
      SCHEDULER_POLL_SECONDS: "5"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["python", "-m", "opswatch_worker.scheduler"]

    restart: unless-stopped

  prober:
    build:
      context: ./prober
    volumes:
      - ./prober:/prober
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata:
  frontend_node_modules:
