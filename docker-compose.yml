services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/app
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
  worker:
    build:
      context: ./worker
    volumes:
      - ./worker:/worker
    env_file: .env
    environment:
      PYTHONPATH: /worker
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  scheduler:
    build:
      context: ./worker
    volumes:
      - ./worker:/worker
    env_file: .env
    environment:
      PYTHONPATH: /worker
      RQ_QUEUE: checks
      SCHEDULER_POLL_SECONDS: "5"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["python", "-m", "opswatch_worker.scheduler"]

    restart: unless-stopped
  prober:
    build:
      context: ./prober
    volumes:
      - ./prober:/prober
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata:
