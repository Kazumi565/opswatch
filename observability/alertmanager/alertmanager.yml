global:
  resolve_timeout: 5m

route:
  receiver: "local-webhook"
  group_by: ["alertname", "job"]
  group_wait: 0s
  group_interval: 10s
  repeat_interval: 2h

receivers:
  - name: "local-webhook"
    webhook_configs:
      - url: "http://alert-receiver:80/"
        send_resolved: true
