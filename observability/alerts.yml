groups:
  - name: opswatch_health
    rules:
      - alert: OpsWatchAPIDown
        expr: up{job="opswatch-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "OpsWatch API is down"
          description: "Prometheus cannot scrape /metrics from opswatch-api for 1m."

      - alert: OpsWatchWorkerDown
        expr: up{job="opswatch-worker"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "OpsWatch worker metrics endpoint is down"
          description: "Prometheus cannot scrape /metrics from opswatch-worker for 1m."

  - name: opswatch_checks
    rules:
      - alert: OpsWatchCheckSuccessRateLow
        expr: |
          (
            sum(rate(opswatch_checks_total{success="true"}[5m])) by (type)
            /
            sum(rate(opswatch_checks_total[5m])) by (type)
          ) < 0.95
          and
          sum(rate(opswatch_checks_total[5m])) by (type) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Check success rate below 95%"
          description: "Success rate for type={{ $labels.type }} is below 95% for 5m."

      - alert: OpsWatchCheckLatencyP95High
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, type) (rate(opswatch_check_duration_seconds_bucket[5m]))
          ) > 1.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "p95 check latency above 1s"
          description: "p95 duration for type={{ $labels.type }} is above 1s for 5m."

      - alert: OpsWatchCheckExceptionsSpiking
        expr: |
          sum(rate(opswatch_check_exceptions_total[5m])) by (type, exception) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Exceptions happening during checks"
          description: "Exceptions for type={{ $labels.type }} exception={{ $labels.exception }} are occurring."
