global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/rules/opswatch.alerts.dev-fast.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "opswatch-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: "opswatch-worker"
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9101"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]
