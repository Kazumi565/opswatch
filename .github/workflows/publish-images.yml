name: Publish Images

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: opswatch-api
            context: ./app
            dockerfile: ./app/Dockerfile
            extra_build_args: ""
          - image_name: opswatch-worker
            context: ./worker
            dockerfile: ./worker/Dockerfile
            extra_build_args: ""
          - image_name: opswatch-scheduler
            context: ./worker
            dockerfile: ./worker/Dockerfile
            extra_build_args: ""
          - image_name: opswatch-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            extra_build_args: OPSWATCH_API_ORIGIN=http://api:8000
          - image_name: opswatch-prober
            context: ./prober
            dockerfile: ./prober/Dockerfile
            extra_build_args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set build variables
        id: vars
        run: |
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            app_version="${GITHUB_REF_NAME}"
          else
            app_version="main-${GITHUB_SHA::7}"
          fi
          built_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "owner_lc=${owner_lc}" >> "${GITHUB_OUTPUT}"
          echo "app_version=${app_version}" >> "${GITHUB_OUTPUT}"
          echo "app_commit=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "app_built_at=${built_at}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.vars.outputs.owner_lc }}/${{ matrix.image_name }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.vars.outputs.app_version }}
            APP_COMMIT=${{ steps.vars.outputs.app_commit }}
            APP_BUILT_AT=${{ steps.vars.outputs.app_built_at }}
            ${{ matrix.extra_build_args }}
