name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-format-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: "true"

      - name: Debug ruff config presence
        run: |
          pwd
          ls -la
          echo "---- ruff.toml ----"
          sed -n '1,120p' ruff.toml

      - name: Ruff lint
        run: uvx ruff check --config ruff.toml --ignore B008 .

      - name: Ruff format (check)
        run: uvx ruff format --config ruff.toml --check .

      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/requirements.txt
          python -m pip install pytest httpx

      - name: Pytest
        env:
          DATABASE_URL: "sqlite+pysqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379/0"
          JWT_SECRET: "ci-test-secret"
          OPSWATCH_API_KEY: "ci-test-api-key"
        run: python -m pytest -q -s

  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Frontend lint
        run: npm --prefix frontend run lint

      - name: Frontend typecheck
        run: npm --prefix frontend run typecheck

      - name: Frontend tests
        run: npm --prefix frontend run test

      - name: Frontend build
        run: npm --prefix frontend run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Capture build metadata
        run: |
          echo "APP_COMMIT=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "APP_BUILT_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker compose build
        run: docker compose build --pull

      - name: Validate deploy compose config
        run: |
          docker compose \
            --env-file deploy/.env.vm.example \
            -f docker-compose.deploy.yml \
            -f docker-compose.deploy.observability.yml \
            --profile observability config >/dev/null

      - name: Validate deploy script syntax
        run: |
          bash -n deploy/scripts/backup_postgres.sh
          bash -n deploy/scripts/restore_postgres.sh
          bash -n deploy/scripts/validate_deploy.sh

  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Capture build metadata
        run: |
          echo "APP_COMMIT=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "APP_BUILT_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Prepare .env for smoke test
        run: |
          cp .env.example .env
          python - <<'PY'
          from pathlib import Path

          env_file = Path(".env")
          text = env_file.read_text()
          text = text.replace("POSTGRES_PASSWORD=change_me", "POSTGRES_PASSWORD=opswatch_ci_password")
          text = text.replace(
              "DATABASE_URL=postgresql+psycopg://opswatch:change_me@postgres:5432/opswatch",
              "DATABASE_URL=postgresql+psycopg://opswatch:opswatch_ci_password@postgres:5432/opswatch",
          )
          text = text.replace(
              "OPSWATCH_API_KEY=replace-with-a-long-random-api-key",
              "OPSWATCH_API_KEY=ci-smoke-api-key",
          )
          env_file.write_text(text)
          PY

      - name: Start core stack
        run: docker compose up -d --build postgres redis migrate api worker scheduler

      - name: Smoke test boot path
        run: |
          python - <<'PY'
          import json
          import time
          import urllib.request

          BASE = "http://127.0.0.1:8000"
          HEADERS = {
              "Content-Type": "application/json",
              "X-API-Key": "ci-smoke-api-key",
          }

          def request_json(method: str, path: str, payload=None):
              body = None if payload is None else json.dumps(payload).encode()
              request = urllib.request.Request(
                  BASE + path,
                  data=body,
                  method=method,
                  headers=HEADERS if payload is not None or method != "GET" else {},
              )
              with urllib.request.urlopen(request, timeout=10) as response:
                  return response.status, json.loads(response.read().decode() or "null")

          deadline = time.time() + 90
          while True:
              try:
                  status, payload = request_json("GET", "/ready")
                  if status == 200 and payload["status"] == "ok":
                      break
              except Exception:
                  pass

              if time.time() > deadline:
                  raise SystemExit("API readiness check timed out")
              time.sleep(2)

          status, created = request_json(
              "POST",
              "/api/monitors",
              {
                  "name": "ci-dns-failure",
                  "type": "dns",
                  "service": "dns",
                  "environment": "ci",
                  "owner": "ci@opswatch.dev",
                  "severity": "critical",
                  "runbook_url": "https://runbooks.example.com/ci-dns",
                  "target": "https://not-a-hostname",
                  "interval_seconds": 60,
                  "timeout_seconds": 1,
                  "incident_threshold": 1,
                  "retries": 0,
                  "enabled": True,
              },
          )
          assert status == 201, created
          monitor_id = created["id"]

          status, enqueued = request_json("POST", f"/api/monitors/{monitor_id}/run")
          assert status == 202, enqueued

          deadline = time.time() + 60
          while True:
              status, runs = request_json("GET", f"/api/monitors/{monitor_id}/runs")
              if status == 200 and runs:
                  break

              if time.time() > deadline:
                  raise SystemExit("worker did not produce a run in time")
              time.sleep(2)

          assert runs[0]["success"] is False
          assert "dns target must be hostname only" in (runs[0]["error"] or "")
          PY

      - name: Print compose logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Trivy FS scan (report-only)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            aquasec/trivy:0.69.1 \
            fs /repo \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format table \
            --exit-code 0
