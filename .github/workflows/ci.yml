name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-format-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: "true"

      - name: Debug ruff config presence
        run: |
          pwd
          ls -la
          echo "---- ruff.toml ----"
          sed -n '1,120p' ruff.toml

      - name: Ruff lint
        run: uvx ruff check --config ruff.toml .

      - name: Ruff format (check)
        run: uvx ruff format --config ruff.toml --check .

      - name: Pytest (minimal)
        run: uvx pytest -q

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker compose build
        run: docker compose build --pull

  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Trivy FS scan (report-only)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            aquasec/trivy:0.69.1 \
            fs /repo \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format table \
            --exit-code 0